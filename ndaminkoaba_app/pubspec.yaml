name: ndaminkoaba_app
description: NdaMinkoaba - Learn, Preserve and Promote the Ewondo Language
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.0
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.3
  google_fonts: ^6.3.1
  flutter_svg: ^2.2.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  intl: ^0.20.2
  just_audio: ^0.10.4
  flutter_markdown: ^0.7.7+1
  image_picker: ^1.2.0
  file_picker: ^12.0.0-beta.7
  permission_handler: ^12.0.1
  url_launcher: ^6.3.1
  fl_chart: ^1.1.0
  google_sign_in: ^7.1.1
  google_identity_services_web: ^0.3.3+1
  web: ^1.1.1
  flutter_facebook_auth: ^7.1.2
  syncfusion_flutter_pdfviewer: ^34.1.31
  flutter_epub_viewer: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon_square.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#1A1C1D"
  adaptive_icon_foreground: "assets/icons/app_icon_adaptive_fg.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon_square.png"
    background_color: "#1A1C1D"
    theme_color: "#0B5D3B"
  windows:
    generate: true
    image_path: "assets/icons/app_icon_square.png"
  macos:
    generate: true
    image_path: "assets/icons/app_icon_square.png"